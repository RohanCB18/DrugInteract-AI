# ═══════════════════════════════════════════════════════════════════════════
#  Docker Compose — Drug Interaction Prediction
#  Runs both backend (FastAPI) and frontend (React/nginx) containers
# ═══════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  backend:
    build: ./backend
    container_name: drug-interaction-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/checkpoints:/app/backend/checkpoints
      - ./backend/data_cache:/app/backend/data_cache
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/backend/predictions.db}
      - FORCE_CPU=${FORCE_CPU:-}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: drug-interaction-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
